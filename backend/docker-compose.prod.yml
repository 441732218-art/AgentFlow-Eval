# AgentFlow Intelligence — production / registry deploy (aligned with docker-compose.yml)
# Copyright: 李凯昕
#
# Expects pre-built images (CI/registry), not local Dockerfile build context.
# Env file: copy .env.docker.example → .env.docker (or inject via orchestrator).
#
#   docker compose -f docker-compose.prod.yml --env-file .env.docker up -d
#
# Differences vs docker-compose.yml (local private stack):
#   - Images from ${REGISTRY}/...:${IMAGE_TAG}
#   - Postgres / Redis have NO host port publish (internal network only)
#   - Frontend on :80; API on :8000
#   - Auth defaults ON

x-common: &common
  restart: unless-stopped
  networks:
    - agentflow-net
  security_opt:
    - no-new-privileges:true

x-backend-env: &backend-env
  ENV: ${ENV:-prod}
  DEBUG: ${DEBUG:-"false"}
  PYTHONPATH: /app
  DEPLOY_PROFILE: ${DEPLOY_PROFILE:-private}
  BILLING_ENABLED: ${BILLING_ENABLED:-false}
  STRIPE_MODE: ${STRIPE_MODE:-mock}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agentflow_eval}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  CELERY_TASK_ALWAYS_EAGER: "false"
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  SECRET_KEY: ${SECRET_KEY}
  CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost","http://127.0.0.1"]'}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-"true"}
  RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-100/minute}
  AUTH_ENABLED: ${AUTH_ENABLED:-true}
  API_KEYS: ${API_KEYS:-}
  TENANCY_ENABLED: ${TENANCY_ENABLED:-false}
  MULTI_TENANT_ENABLED: ${MULTI_TENANT_ENABLED:-false}
  ADMIN_ACTORS: ${ADMIN_ACTORS:-admin}
  PLUGIN_STRICT_MODE: ${PLUGIN_STRICT_MODE:-true}
  PLUGIN_STRICT_ALLOWLIST: ${PLUGIN_STRICT_ALLOWLIST:-true}
  PLUGIN_SIGNATURE_CHECK: ${PLUGIN_SIGNATURE_CHECK:-false}
  PLUGIN_MODULES: ${PLUGIN_MODULES:-}
  PLUGIN_ALLOWLIST: ${PLUGIN_ALLOWLIST:-}

services:
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: agentflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agentflow_eval}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host ports — only reachable on agentflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    container_name: agentflow-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    <<: *common
    # Override: BACKEND_IMAGE=ghcr.io/org/agentflow-backend:1.0.0
    image: ${BACKEND_IMAGE:-agentflow-backend:local}
    container_name: agentflow-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *backend-env
    command: ["alembic", "upgrade", "head"]
    healthcheck:
      disable: true

  backend:
    <<: *common
    image: ${BACKEND_IMAGE:-agentflow-backend:local}
    container_name: agentflow-backend
    user: "10001:10001"
    command:
      [
        "gunicorn",
        "app.main:app",
        "--worker-class",
        "uvicorn.workers.UvicornWorker",
        "--workers",
        "2",
        "--bind",
        "0.0.0.0:8000",
        "--timeout",
        "120",
        "--graceful-timeout",
        "30",
        "--access-logfile",
        "-",
        "--error-logfile",
        "-",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1536M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  celery-worker:
    <<: *common
    image: ${BACKEND_IMAGE:-agentflow-backend:local}
    container_name: agentflow-celery
    user: "10001:10001"
    command:
      [
        "celery",
        "-A",
        "app.core.celery_app.celery:celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
        "--max-tasks-per-child=100",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1536M
    healthcheck:
      disable: true

  celery-beat:
    <<: *common
    image: ${BACKEND_IMAGE:-agentflow-backend:local}
    container_name: agentflow-celery-beat
    command:
      [
        "celery",
        "-A",
        "app.core.celery_app.celery:celery_app",
        "beat",
        "--loglevel=info",
      ]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
    healthcheck:
      disable: true

  frontend:
    <<: *common
    image: ${FRONTEND_IMAGE:-agentflow-frontend:local}
    container_name: agentflow-frontend
    environment:
      # Entrypoint writes runtime-config.json + nginx default key inject
      API_KEYS: ${API_KEYS:-}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  flower:
    <<: *common
    image: mher/flower:2.0
    container_name: agentflow-flower
    profiles: ["ops"]
    command:
      [
        "celery",
        "flower",
        "--broker=redis://redis:6379/0",
        "--port=5555",
        "--basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-change-me}",
      ]
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis
      - celery-worker

  # Observability stack (optional): docker compose --profile obs up -d
  prometheus:
    <<: *common
    image: prom/prometheus:v2.54.1
    container_name: agentflow-prometheus
    profiles: ["obs"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - backend

  grafana:
    <<: *common
    image: grafana/grafana:11.2.0
    container_name: agentflow-grafana
    profiles: ["obs"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../docs/grafana-agentflow.json:/etc/grafana/provisioning/dashboards/agentflow.json:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  agentflow-net:
    driver: bridge


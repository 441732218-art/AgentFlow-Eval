# (c) 2026 AgentFlow-Eval
# Production docker-compose with all services

x-common: &common
  restart: unless-stopped
  networks:
    - agentflow-net

services:
  # ---- PostgreSQL ----
  # Host ports bind 127.0.0.1 only (not LAN/public). Set PUBLISH_DB_PORTS=0 in
  # .env.docker and remove the ports block below for air-gapped / strict prod.
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: agentflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-agentflow_eval}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: agentflow-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- DB migrations (alembic head … 012_agent_logs) ----
  migrate:
    <<: *common
    image: agentflow-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      ENV: ${ENV:-prod}
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentflow}:${POSTGRES_PASSWORD:-agentflow_secret}@postgres:5432/${POSTGRES_DB:-agentflow_eval}
    command: ["alembic", "upgrade", "head"]
    healthcheck:
      disable: true

  # ---- Backend API ----
  backend:
    <<: *common
    image: agentflow-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-backend
    # Explicit CMD so patched images never inherit `sleep` from docker commit
    command:
      [
        "gunicorn",
        "app.main:app",
        "--worker-class",
        "uvicorn.workers.UvicornWorker",
        "--workers",
        "2",
        "--bind",
        "0.0.0.0:8000",
        "--timeout",
        "120",
        "--graceful-timeout",
        "30",
        "--access-logfile",
        "-",
        "--error-logfile",
        "-",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      # .env.docker 优先（完整 Docker 栈）；无则回退 .env
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      ENV: prod
      DEBUG: "false"
      PYTHONPATH: /app
      DEPLOY_PROFILE: ${DEPLOY_PROFILE:-private}
      BILLING_ENABLED: ${BILLING_ENABLED:-false}
      STRIPE_MODE: ${STRIPE_MODE:-mock}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentflow}:${POSTGRES_PASSWORD:-agentflow_secret}@postgres:5432/${POSTGRES_DB:-agentflow_eval}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      # Frontend on :80 (docker) and :5173 (vite) — browser may hit API via nginx proxy (no CORS) or direct
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost","http://localhost:80","http://127.0.0.1","http://127.0.0.1:80","http://localhost:5173","http://127.0.0.1:5173"]'}
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      # Delivery default: auth on. Set AUTH_ENABLED=false only for local demos.
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      API_KEYS: ${API_KEYS:-}
      TENANCY_ENABLED: ${TENANCY_ENABLED:-false}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  # ---- Celery Worker ----
  celery-worker:
    <<: *common
    image: agentflow-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-celery
    command: [
      "celery", "-A", "app.core.celery_app.celery:celery_app", "worker",
      "--loglevel=info",
      "--concurrency=2",
      "--max-tasks-per-child=100"
    ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      ENV: prod
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentflow}:${POSTGRES_PASSWORD:-agentflow_secret}@postgres:5432/${POSTGRES_DB:-agentflow_eval}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    # Worker does not serve HTTP; disable image HEALTHCHECK
    healthcheck:
      disable: true

  # ---- Celery Beat (scheduler) ----
  celery-beat:
    <<: *common
    image: agentflow-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-celery-beat
    command: [
      "celery", "-A", "app.core.celery_app.celery:celery_app", "beat",
      "--loglevel=info"
    ]
    depends_on:
      - redis
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      ENV: prod
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      disable: true


  # ---- Flower (Celery monitor) ----
  flower:
    <<: *common
    image: mher/flower:2.0
    container_name: agentflow-flower
    command: ["celery", "flower", "--broker=redis://redis:6379/0", "--port=5555", "--basic-auth=admin:flower_secret"]
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker

  # ---- Frontend (Nginx) — same-origin /api → backend ----
  frontend:
    <<: *common
    image: agentflow-frontend:local
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Browser calls /api/v1/* on same host; nginx proxies to backend service
        VITE_API_BASE_URL: /api/v1
    container_name: agentflow-frontend
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      # Entrypoint writes /runtime-config.json so SPA auto-fills X-API-Key (private deploy)
      API_KEYS: ${API_KEYS:-}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 — alpine wget may fail on localhost (::1) if nginx is IPv4-only
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:

networks:
  agentflow-net:
    driver: bridge

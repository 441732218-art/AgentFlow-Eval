# Production docker-compose with all services

x-common: &common
  restart: unless-stopped
  networks:
    - agentflow-net

services:
  # ---- PostgreSQL ----
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: agentflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-agentflow_eval}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: agentflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- DB migrations (alembic head: 010 billing, 011 slow_task_events, …) ----
  migrate:
    <<: *common
    image: agentflow-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      ENV: ${ENV:-prod}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentflow}:${POSTGRES_PASSWORD:-agentflow_secret}@postgres:5432/${POSTGRES_DB:-agentflow_eval}
    command: ["alembic", "upgrade", "head"]
    healthcheck:
      disable: true

  # ---- Backend API ----
  backend:
    <<: *common
    image: agentflow-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      # .env.docker 优先（完整 Docker 栈）；无则回退 .env
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      ENV: prod
      DEBUG: "false"
      DEPLOY_PROFILE: ${DEPLOY_PROFILE:-private}
      BILLING_ENABLED: ${BILLING_ENABLED:-false}
      STRIPE_MODE: ${STRIPE_MODE:-mock}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentflow}:${POSTGRES_PASSWORD:-agentflow_secret}@postgres:5432/${POSTGRES_DB:-agentflow_eval}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost","http://localhost:80","http://localhost:3000"]'}
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      API_KEYS: ${API_KEYS:-}
      TENANCY_ENABLED: ${TENANCY_ENABLED:-false}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---- Celery Worker ----
  celery-worker:
    <<: *common
    image: agentflow-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-celery
    command: [
      "celery", "-A", "app.core.celery_app.celery:celery_app", "worker",
      "--loglevel=info",
      "--concurrency=2",
      "--max-tasks-per-child=100"
    ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      ENV: prod
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentflow}:${POSTGRES_PASSWORD:-agentflow_secret}@postgres:5432/${POSTGRES_DB:-agentflow_eval}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    # Worker does not serve HTTP; disable image HEALTHCHECK
    healthcheck:
      disable: true

  # ---- Celery Beat (scheduler) ----
  celery-beat:
    <<: *common
    image: agentflow-backend:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-celery-beat
    command: [
      "celery", "-A", "app.core.celery_app.celery:celery_app", "beat",
      "--loglevel=info"
    ]
    depends_on:
      - redis
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      ENV: prod
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      disable: true


  # ---- Flower (Celery monitor) ----
  flower:
    <<: *common
    image: mher/flower:2.0
    container_name: agentflow-flower
    command: ["celery", "flower", "--broker=redis://redis:6379/0", "--port=5555", "--basic-auth=admin:flower_secret"]
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker

  # ---- Frontend (Nginx) ----
  frontend:
    <<: *common
    image: agentflow-frontend:local
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: agentflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      # Use 127.0.0.1 — alpine wget may fail on localhost (::1) if nginx is IPv4-only
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:

networks:
  agentflow-net:
    driver: bridge

# AgentFlow Desktop — Windows only (electron-builder → GitHub Releases)
# Triggers: push main | tag v* | workflow_dispatch

name: Build Windows

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # required for electron-builder → GitHub Releases

env:
  NODE_VERSION: "20"
  # Unsigned internal builds (no Authenticode cert)
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build-windows:
    name: Build & publish Windows
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      # ---- Frontend SPA (embedded into Electron extraResources/ui) ----
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Electron mode)
        working-directory: frontend
        # Prefer electron-specific build (base: ./); fall back to generic build
        run: |
          if (npm run | Select-String -Pattern "build:electron") {
            npm run build:electron
          } elseif (npm run | Select-String -Pattern " build") {
            npm run build
          } else {
            Write-Error "No build / build:electron script in frontend/package.json"
            exit 1
          }

      - name: Verify frontend dist
        shell: pwsh
        run: |
          if (-not (Test-Path "frontend/dist/index.html")) {
            Write-Error "frontend/dist/index.html missing — UI build failed"
            exit 1
          }

      # ---- Electron shell + electron-builder --win --publish always ----
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build & publish Windows (electron-builder)
        working-directory: desktop
        env:
          # electron-builder GitHub publisher reads GH_TOKEN (and GITHUB_TOKEN)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        # --win only; --publish always uploads to GitHub Releases
        run: npx electron-builder --win --publish always

      - name: List artifacts
        working-directory: desktop
        shell: pwsh
        run: |
          Get-ChildItem -Path release -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName, @{N='MB';E={[math]::Round($_.Length/1MB,2)}} |
            Format-Table -AutoSize

      - name: Upload workflow artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: AgentFlow-Windows-${{ github.sha }}
          path: |
            desktop/release/*.exe
            desktop/release/*.zip
            desktop/release/*.blockmap
            desktop/release/latest.yml
          if-no-files-found: warn
          retention-days: 30

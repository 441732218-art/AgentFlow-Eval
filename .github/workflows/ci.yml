name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ============================================================
  # Backend: Lint + Type Check + Test
  # ============================================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit pytest-cov

      - name: Lint (ruff)
        working-directory: ./backend
        run: ruff check app/ tests/

      - name: Format check (ruff format)
        working-directory: ./backend
        run: ruff format --check app/ tests/

      - name: Type check (mypy)
        working-directory: ./backend
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports

      - name: Security scan (bandit, advisory in CI)
        working-directory: ./backend
        continue-on-error: true
        # Blocking gate lives in test.yml / release.yml; keep CI non-blocking for report artifact
        run: bandit -c .bandit -r app/ -ll -i -f json -o bandit-report.json || true

      - name: Run unit tests with coverage
        working-directory: ./backend
        env:
          ENV: test
          AUTH_ENABLED: "false"
          BILLING_ENABLED: "false"
          DEPLOY_PROFILE: lite
          CELERY_TASK_ALWAYS_EAGER: "true"
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test-key
        run: |
          pytest tests/unit/ tests/scenarios/ -v --cov=app --cov-report=xml --cov-report=html --cov-fail-under=35

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./backend/htmlcov/

  # ============================================================
  # Frontend: Lint + Type Check + Build
  # ============================================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: ./frontend
        continue-on-error: true
        run: npm run lint || true

      - name: Type check (TypeScript)
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1

  # ============================================================
  # E2E Tests (Docker Compose)
  # ============================================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services with Docker Compose
        working-directory: ./backend
        run: |
          docker compose -f docker-compose.yml up -d --build
          sleep 30

      - name: Run database migrations
        working-directory: ./backend
        run: |
          docker compose exec -T backend alembic upgrade head

      - name: Setup Python for API tests
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt httpx pytest pytest-asyncio

      - name: Run E2E tests
        working-directory: ./backend
        env:
          ENV: test
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test-key
        run: |
          pytest tests/test_e2e.py -v

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: ./backend/test-results/
          retention-days: 7

      - name: Shutdown services
        if: always()
        working-directory: ./backend
        run: docker compose down -v

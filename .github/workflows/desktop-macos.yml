# Build AgentFlow Electron installers on real macOS runners.
# Unsigned by default (no Apple Developer cert required).
# Artifacts: desktop/release/*.dmg + *.zip
#
# How to run: Actions → Desktop macOS → Run workflow

name: Desktop macOS

on:
  workflow_dispatch:
    inputs:
      attach_to_release:
        description: "Attach dmg/zip to an existing GitHub Release tag"
        type: boolean
        default: false
      release_tag:
        description: "Tag name for release attach (e.g. v1.0.0); required if attach_to_release"
        required: false
        default: ""
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "frontend/**"
      - "desktop/**"
      - ".github/workflows/desktop-macos.yml"

concurrency:
  group: desktop-macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  build-macos:
    name: Build macOS (dmg + zip)
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check frontend
        working-directory: frontend
        run: npm run type-check

      - name: Build frontend (Electron mode, base ./)
        working-directory: frontend
        run: npm run build:electron

      - name: Verify SPA dist
        run: test -f frontend/dist/index.html

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Package macOS (electron-builder)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac

      - name: List release artifacts
        working-directory: desktop
        run: |
          ls -lah release/ || true
          find release -maxdepth 2 -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.blockmap' \) -print

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AgentFlow-macOS-${{ github.sha }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.blockmap
          if-no-files-found: error
          retention-days: 30

      # Tag push: attach installers to that release
      - name: Attach artifacts to release (tag push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.dmg
            desktop/release/*.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Manual: attach to an existing tag when requested
      - name: Attach artifacts to release (manual)
        if: >
          github.event_name == 'workflow_dispatch' &&
          inputs.attach_to_release == true &&
          inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            desktop/release/*.dmg
            desktop/release/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

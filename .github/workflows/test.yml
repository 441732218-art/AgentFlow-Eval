name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov bandit pip-audit
      - name: Ruff
        working-directory: ./backend
        run: ruff check app/ tests/
      - name: Bandit (medium+ severity gate)
        working-directory: ./backend
        # -ll = medium and higher; -i = any confidence; config: backend/.bandit
        # True HIGH issues fail here; MEDIUM (e.g. unpinned HF models) also fail until fixed.
        run: bandit -c .bandit -r app/ -ll -i -f txt
      - name: pip-audit (advisory)
        working-directory: ./backend
        continue-on-error: true
        run: pip-audit -r requirements.txt || true
      - name: Unit + scenario tests
        working-directory: ./backend
        env:
          ENV: test
          AUTH_ENABLED: "false"
          BILLING_ENABLED: "false"
          MULTI_TENANT_ENABLED: "false"
          DEPLOY_PROFILE: lite
          CELERY_TASK_ALWAYS_EAGER: "true"
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test-key
        run: |
          pytest tests/unit/ tests/scenarios/ -q \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=40
      - name: API contract freeze
        working-directory: ./backend
        env:
          ENV: test
          PYTHONPATH: .
        run: |
          python scripts/export_openapi.py --check ../docs/openapi-v1.json || \
            python scripts/export_openapi.py -o /tmp/openapi-current.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: backend/coverage.xml

  frontend:
    name: Frontend typecheck + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & check
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
          npx vitest run --passWithNoTests

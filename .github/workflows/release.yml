name: Release

on:
  push:
    tags:
      - "v1.*"
      - "v0.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  test:
    name: Gate tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Backend tests
        working-directory: ./backend
        env:
          ENV: test
          AUTH_ENABLED: "false"
          BILLING_ENABLED: "false"
          CELERY_TASK_ALWAYS_EAGER: "true"
          DEPLOY_PROFILE: lite
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test
        run: |
          pip install -r requirements.txt pytest-cov ruff
          ruff check app/ tests/
          pytest tests/unit/ tests/scenarios/ -q --cov=app --cov-fail-under=40

  build-push:
    name: Build & push images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            file: ./backend/Dockerfile.backend
          - service: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image name
        id: image
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "name=${owner}/agentflow-eval-${{ matrix.service }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.service == 'frontend' && 'VITE_API_BASE_URL=/api/v1' || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  github-release:
    name: Publish GitHub Release
    needs: [test, build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: AgentFlow-Eval ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          body: |
            ## AgentFlow-Eval ${{ steps.tag.outputs.name }}

            Enterprise Agent Evaluation Platform (lite / private / saas).

            ### Container images
            - `ghcr.io/441732218-art/agentflow-eval-backend:${{ steps.tag.outputs.name }}`
            - `ghcr.io/441732218-art/agentflow-eval-frontend:${{ steps.tag.outputs.name }}`

            ### Quick private deploy
            ```bash
            export BACKEND_IMAGE=ghcr.io/441732218-art/agentflow-eval-backend:${{ steps.tag.outputs.name }}
            export FRONTEND_IMAGE=ghcr.io/441732218-art/agentflow-eval-frontend:${{ steps.tag.outputs.name }}
            cd backend && docker compose -f docker-compose.prod.yml --env-file .env.docker up -d
            ```

            See `DEPLOYMENT_GUIDE.md`, `FINAL_RELEASE_REPORT.md`, `SECURITY.md`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Tag release gate: tests + GitHub Release notes.
# Container images are built/pushed by "Docker Build & Push" (docker-build.yml)
# on the same tag — single Docker pipeline only.

name: Release

on:
  push:
    tags:
      - "v1.*"
      - "v0.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Gate tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Backend gate (ruff + bandit + pytest)
        working-directory: ./backend
        env:
          ENV: test
          AUTH_ENABLED: "false"
          BILLING_ENABLED: "false"
          CELERY_TASK_ALWAYS_EAGER: "true"
          DEPLOY_PROFILE: lite
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test
        run: |
          pip install -r requirements.txt pytest-cov ruff bandit
          ruff check app/ tests/
          bandit -c .bandit -r app/ -ll -i -f txt
          pytest tests/unit/ tests/scenarios/ -q --cov=app --cov-fail-under=40

  github-release:
    name: Publish GitHub Release notes
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi
      - name: Resolve release notes file
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          FILE="docs/releases/${TAG}.md"
          if [ -f "$FILE" ]; then
            echo "Using $FILE"
            echo "path=$FILE" >> "$GITHUB_OUTPUT"
          else
            echo "No $FILE — writing fallback notes"
            mkdir -p docs/releases
            cat > /tmp/release-body.md <<EOF
          ## AgentFlow Intelligence ${TAG}

          Enterprise Agent Evaluation Platform（lite / private / saas）。

          ### Desktop
          安装包由 Windows / macOS 桌面 CI 上传到本 Release Assets。

          ### Container images (GHCR)
          - \`ghcr.io/441732218-art/agentflow-eval-backend:${TAG}\`
          - \`ghcr.io/441732218-art/agentflow-eval-frontend:${TAG}\`

          详见 \`DEPLOYMENT_GUIDE.md\`、\`SECURITY.md\`。
          EOF
            echo "path=/tmp/release-body.md" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: AgentFlow Intelligence ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          body_path: ${{ steps.notes.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

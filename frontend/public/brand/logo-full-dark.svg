<?xml version="1.0" encoding="UTF-8"?>
<!-- AgentFlow Intelligence — Full wordmark for dark backgrounds -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" fill="none" role="img" aria-label="AgentFlow Intelligence">
  <defs>
    <linearGradient id="afi-d-core" x1="16" y1="14" x2="72" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="0.55" stop-color="#6D7CFF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="afi-d-text" x1="100" y1="20" x2="380" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F4FF"/>
      <stop offset="1" stop-color="#B8C9E0"/>
    </linearGradient>
    <linearGradient id="afi-d-stream" x1="14" y1="62" x2="78" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF" stop-opacity="0.1"/>
      <stop offset="0.4" stop-color="#00D4FF"/>
      <stop offset="0.75" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#FFC857"/>
    </linearGradient>
    <radialGradient id="afi-d-glow" cx="48" cy="48" r="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Icon plate -->
  <rect x="4" y="8" width="80" height="80" rx="20" fill="#0A1224"/>
  <rect x="4.6" y="8.6" width="78.8" height="78.8" rx="19.4" stroke="url(#afi-d-core)" stroke-opacity="0.4" stroke-width="1.2"/>
  <circle cx="44" cy="48" r="30" fill="url(#afi-d-glow)"/>
  <circle cx="44" cy="48" r="24" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="2.5 4"/>
  <circle cx="44" cy="48" r="17" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1.1"/>

  <path d="M16 64 C26 46, 34 66, 44 48 S60 28, 72 36" stroke="url(#afi-d-stream)" stroke-width="2.4" stroke-linecap="round" fill="none"/>

  <g stroke="#00D4FF" stroke-opacity="0.5" stroke-width="1.1">
    <path d="M44 28 L58 36 M58 36 L62 54 M62 54 L44 68 M44 68 L26 54 M26 54 L30 36 M30 36 L44 28"/>
    <path d="M30 36 L44 48 M58 36 L44 48 M26 54 L44 48 M62 54 L44 48"/>
  </g>
  <circle cx="44" cy="28" r="2.8" fill="#00D4FF"/>
  <circle cx="58" cy="36" r="2.6" fill="#8B5CF6"/>
  <circle cx="62" cy="54" r="2.8" fill="#00D4FF"/>
  <circle cx="44" cy="68" r="2.6" fill="#FFC857"/>
  <circle cx="26" cy="54" r="2.8" fill="#8B5CF6"/>
  <circle cx="30" cy="36" r="2.6" fill="#00D4FF"/>

  <path d="M44 36 L52 41.5 L52 52.5 L44 58 L36 52.5 L36 41.5 Z" fill="url(#afi-d-core)" fill-opacity="0.18" stroke="url(#afi-d-core)" stroke-width="1.2"/>
  <circle cx="44" cy="48" r="6.5" fill="url(#afi-d-core)"/>
  <circle cx="44" cy="48" r="3.4" fill="#F4FBFF"/>
  <circle cx="44" cy="48" r="1.5" fill="#FFC857"/>

  <!-- Wordmark -->
  <text x="102" y="48" font-family="Inter, SF Pro Display, Segoe UI, sans-serif" font-size="28" font-weight="750" letter-spacing="-0.6" fill="url(#afi-d-text)">AgentFlow</text>
  <text x="102" y="72" font-family="Inter, SF Pro Display, Segoe UI, sans-serif" font-size="13" font-weight="600" letter-spacing="3.2" fill="#00D4FF">INTELLIGENCE</text>
  <rect x="102" y="78" width="36" height="2" rx="1" fill="#FFC857" fill-opacity="0.85"/>

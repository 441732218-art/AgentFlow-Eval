# Private Docker convenience: if browser omits X-API-Key, inject DEFAULT_API_KEY
# (substituted by docker-entrypoint from API_KEYS secret). Direct :8000 still requires key.
map $http_x_api_key $af_upstream_api_key {
    ""      "@@DEFAULT_API_KEY@@";
    default $http_x_api_key;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Runtime API key bootstrap (written by docker-entrypoint from API_KEYS)
    location = /runtime-config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/json";
        try_files $uri =404;
    }

    # REST API + WebSocket (e.g. /api/v1/ws/activities)
    # Frontend builds with VITE_API_BASE_URL=/api/v1 → browser same-origin, no CORS
    location /api/ {
        # container_name is agentflow-backend (works for compose + docker run)
        proxy_pass http://agentflow-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-API-Key $af_upstream_api_key;
        proxy_connect_timeout 10s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Backend readiness (for ops); SPA shell uses / for UI
    location = /health/ready {
        proxy_pass http://agentflow-backend:8000/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /health/live {
        proxy_pass http://agentflow-backend:8000/health/live;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Nginx container liveness (compose healthcheck)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /metrics {
        proxy_pass http://agentflow-backend:8000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
